# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  HYPRLOCK — 墨絵 Lock Screen
#  Fond flouté, horloge fine, champ minimaliste
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
    pam_module          = hyprlock
}

# ─── Fond d'écran flouté ──────────────────────────
background {
    monitor    =
    path       = ~/.config/hypr/wallpaper/samurai.png

    blur_size        = 6
    blur_passes      = 3
    noise            = 0.015
    contrast         = 1.0
    brightness       = 0.6
    vibrancy         = 0.15
    vibrancy_darkness = 0.0
}

# ─── Overlay sombre semi-transparent ─────────────
shape {
    monitor  =
    size     = 1920, 1080
    color    = rgba(0, 0, 0, 0.35)
    position = 0, 0
    halign   = left
    valign   = top
}

# ─── Heure principale ─────────────────────────────
label {
    monitor  =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(245, 241, 230, 0.95)

    font_size   = 88
    font_family = IPAMincho, Noto Serif JP

    position = 0, 140
    halign   = center
    valign   = center

    shadow_passes    = 1
    shadow_size      = 4
    shadow_color     = rgba(0, 0, 0, 0.4)
    shadow_boost     = 1.0
}

# ─── Date ─────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:60000] echo "$(LC_TIME=fr_FR.UTF-8 date +"%A %d %B %Y")"
    color    = rgba(245, 241, 230, 0.70)

    font_size   = 16
    font_family = IPAMincho, Noto Serif JP

    position = 0, 50
    halign   = center
    valign   = center

    shadow_passes = 1
    shadow_size   = 2
    shadow_color  = rgba(0, 0, 0, 0.3)
}

# ─── Séparateur calligraphique ────────────────────
label {
    monitor  =
    text     = ─── 墨 ───
    color    = rgba(245, 241, 230, 0.35)

    font_size   = 13
    font_family = IPAMincho, Noto Serif JP

    position = 0, -30
    halign   = center
    valign   = center
}

# ─── Champ de mot de passe ────────────────────────
input-field {
    monitor  =
    size     = 220, 40

    outline_thickness = 1
    dots_size         = 0.25
    dots_spacing      = 0.35
    dots_center       = true
    dots_rounding     = -2

    outer_color       = rgba(245, 241, 230, 0.6)
    inner_color       = rgba(0, 0, 0, 0.25)
    font_color        = rgba(245, 241, 230, 0.95)
    fade_on_empty     = true
    fade_timeout      = 1200
    placeholder_text  = <i>鍵 — mot de passe</i>

    font_family       = Victor Mono
    font_size         = 13

    check_color       = rgba(245, 241, 230, 0.9)
    fail_color        = rgba(180, 80, 60, 0.9)
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout      = 2000
    fail_transition   = 200

    capslock_color    = rgba(200, 160, 60, 0.9)

    rounding     = 0
    position     = 0, -90
    halign       = center
    valign       = center
}

# ─── Message de déverrouillage ────────────────────
label {
    monitor  =
    text     = 入れ — Entrez
    color    = rgba(245, 241, 230, 0.30)

    font_size   = 11
    font_family = IPAMincho, Noto Serif JP

    position = 0, -135
    halign   = center
    valign   = center
}
