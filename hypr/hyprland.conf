#  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
#  в•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ     в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ
#
#  ThГЁme : еўЁзөө (Sumi-e) вҖ” Encre sur Papier
#  InspirГ© de Vagabond / Takehiko Inoue
####################################################


####################################################
#  MONITEURS вҖ” NVIDIA Desktop
#  Format : monitor=NAME,RESxRES@HZ,POSxPOS,SCALE
####################################################

# Moniteur principal (75Hz) вҖ” Г  gauche
monitor = DP-1, 1920x1080@75, 0x0, 1
# Moniteur secondaire (60Hz) вҖ” Г  droite
monitor = DP-2, 1920x1080@60, 1920x0, 1

# Fallback : auto-dГ©tection si les noms diffГЁrent
# DГ©commente et adapte si DP-1/DP-2 ne correspondent pas :
# monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1
# Pour lister tes moniteurs : hyprctl monitors


####################################################
#  VARIABLES COULEURS  еўЁ (Ink / Sumi)
####################################################

$ivoire      = rgb(F5F1E6)
$ivoire_hex  = #F5F1E6
$noir        = rgb(1A1A1A)
$noir_hex    = #1A1A1A
$gris_encre  = rgb(3D3935)


####################################################
#  NVIDIA вҖ” Variables d'environnement obligatoires
####################################################

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# Curseurs Wayland sur NVIDIA
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,20

# Scaling Wayland natif
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland


####################################################
#  APPARENCE вҖ” зҙҷ (Kami / Papier)
####################################################

general {
    # Couleurs des bordures
    col.active_border   = $noir        # FenГӘtre active : bordure noire
    col.inactive_border = $ivoire      # FenГӘtre inactive : bord ivoire

    border_size         = 1            # Ultra-fines, style encre
    gaps_in             = 7            # Entre les fenГӘtres
    gaps_out            = 15           # Vers les bords de l'Г©cran

    layout              = master       # Mode Master uniquement
    resize_on_border    = true
    hover_icon_on_border = false
}

decoration {
    rounding            = 0            # ZГ©ro arrondi вҖ” angles nets comme une lame

    # Aucun flou вҖ” aspect "papier" pur
    blur {
        enabled         = false
    }

    # LГ©gГЁre ombre portГ©e pour la profondeur
    shadow {
        enabled         = true
        range           = 6
        render_power    = 2
        color           = rgba(1A1A1A55)
        color_inactive  = rgba(1A1A1A15)
    }

    # OpacitГ© 100% вҖ” pas de transparence
    active_opacity      = 1.0
    inactive_opacity    = 1.0
    fullscreen_opacity  = 1.0
}


####################################################
#  ANIMATIONS вҖ” ж–¬ (Zan / Tranchant)
#  Style "Katana slash" вҖ” rapide, sec, prГ©cis
####################################################

animations {
    enabled = true

    # Courbes personnalisГ©es
    bezier = slash,    0.05, 0.9, 0.1, 1.0    # EntrГ©e lente, sortie rapide
    bezier = katana,   0.25, 0.46, 0.45, 0.94  # Coupure nette
    bezier = snap,     0.77, 0.0,  0.175, 1.0  # Snap instantanГ©

    # FenГӘtres : apparition/disparition tranchante
    animation = windows,     1, 2, slash,   slide
    animation = windowsOut,  1, 1, snap,    slide
    animation = windowsMove, 1, 2, katana

    # Bordures : transition instantanГ©e
    animation = border,      1, 1, snap

    # Workspaces : glissement horizontal sec
    animation = workspaces,  1, 2, katana,  slidefade 30%

    # Fondu des layers (Waybar, Wofi...)
    animation = layers,      1, 1, snap,    fade
    animation = fadeLayersIn,  1, 1, snap
    animation = fadeLayersOut, 1, 1, snap
}


####################################################
#  LAYOUT MASTER вҖ” дё»еҫ“ (Shujuu / MaГ®tre & Serviteur)
####################################################

master {
    new_status          = slave        # Nouvelles fenГӘtres dans la pile
    new_on_top          = false
    mfact               = 0.60         # MaГ®tre = 60% de l'Г©cran
    orientation         = left         # MaГ®tre Г  gauche
    inherit_fullscreen  = true
    allow_small_split   = false
    smart_resizing      = true
}


####################################################
#  ENTRГүES вҖ” е…ҘеҠӣ
####################################################

input {
    kb_layout           = fr           # Clavier AZERTY franГ§ais
    kb_variant          =
    kb_model            =
    kb_options          =
    kb_rules            =

    follow_mouse        = 1
    mouse_refocus       = true

    touchpad {
        natural_scroll  = true
    }

    sensitivity         = 0            # -1.0 Г  1.0 ; 0 = pas d'accГ©lГ©ration
    accel_profile       = flat
}

gestures {
    workspace_swipe = false
}


####################################################
#  MISC
####################################################

misc {
    force_default_wallpaper = 0        # DГ©sactive l'anime par dГ©faut d'Hyprland
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    focus_on_activate       = true
    vrr                     = 1        # Variable Refresh Rate (G-Sync)
    vfr                     = true     # Гүconomie d'Г©nergie
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}


####################################################
#  DГүMARRAGE вҖ” иө·еӢ• (Kidou)
####################################################

# Fond d'Г©cran вҖ” samouraГҜ Sumi-e
exec-once = swaybg -m fill -i ~/.config/hypr/wallpaper/samurai.png

# Barre de statut
exec-once = waybar

# Gestionnaire de notifications discret
exec-once = dunst

# Gestionnaire de presse-papiers
exec-once = wl-paste --type text --watch cliphist store

# Curseur
exec-once = hyprctl setcursor Bibata-Modern-Ice 20

# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ
#  гӮігғјгғүгҒ®жөҒгӮҢ вҖ” "Le Flux du Code"
#  Terminal flottant cmatrix en coin infГ©rieur droit
#  Taille ~1/6 de l'Г©cran (вүҲ320x300px), Г©pinglГ©
# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ
exec-once = sleep 3 && kitty \
    --class="sumi-matrix" \
    --title="гӮігғјгғүгҒ®жөҒгӮҢ" \
    --config ~/.config/kitty/matrix.conf \
    -e cmatrix -C white -K -s


####################################################
#  WINDOW RULES вҖ” зӘ“гҒ®жі• (Mado no Hou)
####################################################

# в”Җв”Җв”Җ Terminal Sumi-e Matrix (coin infГ©rieur droit) в”Җв”Җв”Җ
windowrulev2 = float,            class:^(sumi-matrix)$
windowrulev2 = size 380 260,     class:^(sumi-matrix)$
windowrulev2 = move 1510 795,    class:^(sumi-matrix)$
windowrulev2 = pin,              class:^(sumi-matrix)$
windowrulev2 = noborder,         class:^(sumi-matrix)$
windowrulev2 = nofocus,          class:^(sumi-matrix)$
windowrulev2 = noinitialfocus,   class:^(sumi-matrix)$
windowrulev2 = noblur,           class:^(sumi-matrix)$
windowrulev2 = noshadow,         class:^(sumi-matrix)$

# в”Җв”Җв”Җ Wofi / Rofi (lanceur centrГ©) в”Җв”Җв”Җ
windowrulev2 = float,   class:^(wofi)$
windowrulev2 = center,  class:^(wofi)$

# в”Җв”Җв”Җ FenГӘtres de dialogue в”Җв”Җв”Җ
windowrulev2 = float,   class:^(file-roller)$
windowrulev2 = float,   title:^(Open File)$
windowrulev2 = float,   title:^(Save As)$
windowrulev2 = float,   title:^(Confirm)$

# в”Җв”Җв”Җ Nautilus (plein Г©cran sur workspace 3) в”Җв”Җв”Җ
windowrulev2 = workspace 3, class:^(nautilus)$

# в”Җв”Җв”Җ Firefox / Brave в”Җв”Җв”Җ
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(brave-browser)$


####################################################
#  WORKSPACES вҖ” й–“ (Ma / Espace)
####################################################

# Workspaces assignГ©s par moniteur
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-1
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1
workspace = 6,  monitor:DP-2, default:true
workspace = 7,  monitor:DP-2
workspace = 8,  monitor:DP-2
workspace = 9,  monitor:DP-2
workspace = 10, monitor:DP-2


####################################################
#  KEYBINDS вҖ” еҲғ (Ha / Lame)
####################################################

$mod = SUPER

# в”Җв”Җв”Җ Applications в”Җв”Җв”Җ
bind = $mod,       Return, exec, kitty
bind = $mod,       E,      exec, nautilus
bind = $mod,       B,      exec, firefox
bind = $mod SHIFT, P,      exec, hyprpicker -a   # Pipette couleur

# в”Җв”Җв”Җ Lanceur Wofi в”Җв”Җв”Җ
bind = $mod, Space, exec, wofi --show drun

# в”Җв”Җв”Җ FenГӘtres в”Җв”Җв”Җ
bind = $mod, Q,           killactive
bind = $mod, F,           fullscreen, 0
bind = $mod SHIFT, F,     fullscreen, 1          # Pseudo-plein Г©cran
bind = $mod, T,           togglefloating
bind = $mod, C,           centerwindow

# в”Җв”Җв”Җ Focus navigation (Vim keys) в”Җв”Җв”Җ
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# в”Җв”Җв”Җ DГ©placer fenГӘtres в”Җв”Җв”Җ
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# в”Җв”Җв”Җ Redimensionner avec le clavier в”Җв”Җв”Җ
binde = $mod CTRL, H, resizeactive, -20 0
binde = $mod CTRL, L, resizeactive, 20 0
binde = $mod CTRL, K, resizeactive, 0 -20
binde = $mod CTRL, J, resizeactive, 0 20

# в”Җв”Җв”Җ Redimensionner master в”Җв”Җв”Җ
bind = $mod, M,       layoutmsg, focusmaster master
bind = $mod SHIFT, M, layoutmsg, swapwithmaster
binde = $mod ALT, H,  layoutmsg, mfact -0.05
binde = $mod ALT, L,  layoutmsg, mfact +0.05

# в”Җв”Җв”Җ Workspaces (Navigation) в”Җв”Җв”Җ
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# в”Җв”Җв”Җ DГ©placer fenГӘtre vers workspace в”Җв”Җв”Җ
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# в”Җв”Җв”Җ Scroll entre workspaces в”Җв”Җв”Җ
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# в”Җв”Җв”Җ DГ©placer/Redimensionner Г  la souris в”Җв”Җв”Җ
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ
#  MULTIMГүDIA вҖ” йҹі (Oto / Son)
# в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ

# Volume (wpctl + dunst OSD)
binde =, XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume.sh up
binde =, XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume.sh down
bind  =, XF86AudioMute,         exec, ~/.config/hypr/scripts/volume.sh mute
bind  =, XF86AudioPlay,         exec, playerctl play-pause
bind  =, XF86AudioPause,        exec, playerctl play-pause
bind  =, XF86AudioNext,         exec, playerctl next
bind  =, XF86AudioPrev,         exec, playerctl previous

# LuminositГ© (brillo ou brightnessctl)
binde =, XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness.sh up
binde =, XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# Capture d'Г©cran
bind  =, Print,         exec, grimblast copy area
bind  = SHIFT, Print,   exec, grimblast save area ~/Images/screenshots/$(date +%Y%m%d_%H%M%S).png

# в”Җв”Җв”Җ SystГЁme в”Җв”Җв”Җ
bind = $mod SHIFT, Delete, exec, hyprlock
bind = $mod SHIFT, E,      exec, wlogout
bind = $mod SHIFT, R,      exec, hyprctl reload

# в”Җв”Җв”Җ Matrix Toggle (cacher/montrer le terminal) в”Җв”Җв”Җ
bind = $mod, X, exec, hyprctl dispatch togglespecialworkspace matrix
