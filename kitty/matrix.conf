# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KITTY — matrix.conf
#  Config spéciale pour le terminal "コードの流れ"
#  Fond noir pur, pas de décorations, police mono
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Couleurs — Encre pure
background            #0D0D0D
foreground            #F5F1E6
cursor                #F5F1E6
cursor_shape          beam
cursor_blink_interval 0

# Sélection
selection_background  #F5F1E6
selection_foreground  #0D0D0D

# Couleurs ANSI — monochrome strict
color0   #0D0D0D
color1   #3D3935
color2   #3D3935
color3   #3D3935
color4   #3D3935
color5   #3D3935
color6   #8C8279
color7   #F5F1E6
color8   #1A1A1A
color9   #5A5550
color10  #5A5550
color11  #5A5550
color12  #5A5550
color13  #5A5550
color14  #8C8279
color15  #FFFFFF

# Police
font_family      Victor Mono Regular
italic_font      Victor Mono Italic
bold_font        Victor Mono Bold
font_size        11.0

# Taille de la fenêtre
initial_window_width   380
initial_window_height  260

# Pas de barre de titre ni de bordures
hide_window_decorations yes
remember_window_size    no

# Pas de scrollbar
scrollback_lines 0

# Marges intérieures
window_padding_width 4

# Transparence légère — encre sur fond sombre
background_opacity 0.92

# Aucun son
enable_audio_bell no

# Pas d'onglets
tab_bar_style hidden

# Performance
sync_to_monitor yes
